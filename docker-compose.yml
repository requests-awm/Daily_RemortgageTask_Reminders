# Single container: one image serves the SPA + the API on one port.
# Same image deploys to Cloud Run.
#
# Prereq: copy server/.env.example -> server/.env and fill in real values.
# Start:  docker compose up --build   ->   http://localhost:8080
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # SPA is baked live + same-origin (calls /api/* on its own host).
        VITE_USE_MOCK: "false"
        VITE_API_BASE_URL: ""
    image: mortgage-reminders
    # Secrets injected at runtime, never baked into the image.
    env_file:
      - ./server/.env
    environment:
      PORT: "8080"
      # Safety defaults — also default on in code, set here for clarity.
      SEND_MODE: ${SEND_MODE:-dry}
      TEST_RECIPIENTS_ONLY: ${TEST_RECIPIENTS_ONLY:-true}
      AUTO_SEND: ${AUTO_SEND:-clean}
    ports:
      - "8080:8080"
    restart: unless-stopped
