name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # No lint/test suite yet — verify the frontend builds and the server parses.
      - name: Build frontend
        run: npm run build
      - name: Syntax-check server
        run: |
          node --check server/index.mjs
          node --check server/pipeline.mjs
          node --check server/scheduler.mjs
          node --check server/mailer.mjs
